name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # NB: il frontend vanilla è stato deprecato e rimosso. I job che ne
  # verificavano la sintassi JS e il checkJs (lint-js, typecheck-frontend) sono
  # stati eliminati: il gate frontend è ora il solo job `frontend-react`.

  # ---------------------------------------------------------------------------
  # 2) Sintassi script bash (scripts/ + deploy/)
  # ---------------------------------------------------------------------------
  lint-bash:
    name: Lint Bash (syntax + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash -n su tutti gli script
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error"
              FAIL=1
            fi
          done < <(find scripts deploy -type f -name "*.sh")
          exit $FAIL

      - name: shellcheck
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq shellcheck
          # SC1091 (sourced file not found) e SC2086 (word splitting intentionale): noi li tolleriamo
          shellcheck --severity=warning --exclude=SC1091,SC2086,SC2034 scripts/*.sh || exit 1

  # ---------------------------------------------------------------------------
  # 3) Server TypeScript: typecheck (Drizzle ORM + Fastify routes)
  # ---------------------------------------------------------------------------
  lint-server:
    name: Lint server (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 3a-bis) Frontend React (frontend/): typecheck strict + lint + unit + build.
  # ---------------------------------------------------------------------------
  frontend-react:
    name: Frontend React (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck (tsc -b strict)
        working-directory: frontend
        run: npx tsc -b

      - name: Lint (eslint — 0 errori)
        working-directory: frontend
        run: npm run lint

      - name: Unit test (vitest)
        working-directory: frontend
        run: npm run test

      - name: Build (vite + PWA)
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # 3b) Test server (integrazione): Postgres 18 reale → bootstrap + setup +
  #     seed + suite completa (rls/auth/crud/realtime). uuidv7() richiede PG18.
  # ---------------------------------------------------------------------------
  server-tests:
    name: Server tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_BOOTSTRAP: postgres://postgres:postgres@localhost:5432/postgres
      DATABASE_URL_APP: postgres://gestimus_app:devpassword@localhost:5432/gestimus
      DATABASE_URL_SUPER: postgres://gestimus_super:devpassword@localhost:5432/gestimus
      SESSION_COOKIE_SECRET: ci-secret-min-32-chars-long-aaaaaaaaaaaa
      GESTIMUS_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install deps
        working-directory: server
        run: npm ci
      - name: Bootstrap DB (ruoli + database)
        working-directory: server
        run: npm run db:bootstrap
      - name: Setup schema + policies RLS
        working-directory: server
        # drizzle-kit push richiede un TTY (config strict:true). In CI usiamo
        # --force che auto-approva senza prompt; su DB vuoto non c'è comunque
        # data-loss. Poi applichiamo policies/trigger/RLS.
        run: |
          npx drizzle-kit push --force
          npm run db:policies
      - name: Seed dati demo
        working-directory: server
        run: npm run db:seed
      - name: Run test suite
        working-directory: server
        run: npm test

  # ---------------------------------------------------------------------------
  # 4) Migrazioni SQL incrementali: pattern + ordine progressivo
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pattern + ordine progressivo
        run: |
          set -e
          # Pattern up:   server/scripts/migrations/YYYY_MM_DD_<descr>.sql
          # Pattern down: server/scripts/migrations/YYYY_MM_DD_<descr>.down.sql (rollback, opzionale)
          # L'ordine è dato dal nome (lessicografico) ed è strettamente crescente.
          PREV=""
          COUNT=0
          shopt -s nullglob
          for f in $(ls server/scripts/migrations/*.sql 2>/dev/null | sort); do
            base=$(basename "$f")
            # I file di rollback sono validati a parte (sotto): saltali qui.
            case "$base" in *.down.sql) continue;; esac
            if ! echo "$base" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[a-z0-9_]+\.sql$'; then
              echo "::error file=$f::Migration name non rispetta il pattern YYYY_MM_DD_<descr>.sql"
              exit 1
            fi
            if [ -n "$PREV" ] && [ "$base" \< "$PREV" ]; then
              echo "::error file=$f::Migration ($base) precede $PREV — le migration devono essere progressive"
              exit 1
            fi
            PREV=$base
            COUNT=$((COUNT + 1))
          done
          echo "✓ $COUNT migration SQL (up) verificate"

      - name: Rollback (.down.sql) — naming + match con la up
        run: |
          set -e
          DOWN=0
          shopt -s nullglob
          for f in server/scripts/migrations/*.down.sql; do
            base=$(basename "$f")
            if ! echo "$base" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[a-z0-9_]+\.down\.sql$'; then
              echo "::error file=$f::Rollback name non rispetta il pattern YYYY_MM_DD_<descr>.down.sql"
              exit 1
            fi
            up="server/scripts/migrations/${base%.down.sql}.sql"
            if [ ! -f "$up" ]; then
              echo "::error file=$f::Rollback senza migration up corrispondente ($up)"
              exit 1
            fi
            DOWN=$((DOWN + 1))
          done
          echo "✓ $DOWN rollback (.down.sql) verificati"
          echo "ℹ Le migration nuove DOVREBBERO includere un .down.sql; quelle senza sono dichiarate irreversibili (vedi docs/MIGRATIONS.md)."

  # ---------------------------------------------------------------------------
  # 5) i18n: parità di copertura EN/FR/ES rispetto a IT sui locale React.
  #    (Le traduzioni sono in frontend/src/i18n/locales/<lang>.json, flat keys.)
  #    NB: niente più scansione "uso vs IT": il frontend React usa il pattern
  #    t(key, { defaultValue }) per alcune stringhe, quindi non tutte le chiavi
  #    usate sono definite nei JSON. La parità tra lingue resta l'invariante.
  # ---------------------------------------------------------------------------
  i18n-coverage:
    name: i18n coverage (parità EN/FR/ES vs IT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verifica parità chiavi i18n (React)
        run: |
          python3 <<'PY'
          import json, sys, os
          base = 'frontend/src/i18n/locales'
          def keys_of(lang):
              p = f'{base}/{lang}.json'
              if not os.path.exists(p):
                  return None
              with open(p, encoding='utf-8') as fh:
                  return set(json.load(fh).keys())
          it_keys = keys_of('it')
          if it_keys is None:
              print(f'::error::{base}/it.json non trovato'); sys.exit(1)
          rc = 0
          for lang in ('en', 'fr', 'es'):
              k = keys_of(lang)
              if k is None:
                  print(f'::error::{base}/{lang}.json non trovato'); rc = 1; continue
              miss = sorted(it_keys - k)
              extra = sorted(k - it_keys)
              print(f'{lang}: {len(k)} chiavi · mancanti vs IT: {len(miss)} · extra: {len(extra)}')
              for x in miss[:30]:
                  print(f'::error::chiave i18n mancante in {lang}: {x}')
              if miss:
                  rc = 1
          print(f'IT: {len(it_keys)} chiavi')
          sys.exit(rc)
          PY

  # ---------------------------------------------------------------------------
  # 6) Filesystem audit: nessun file > 5 MB nel repo (oltre alla soglia GH 100 MB)
  # ---------------------------------------------------------------------------
  size-audit:
    name: Audit dimensioni file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verifica nessun file > 5 MB
        run: |
          set -e
          LARGE=$(find . -type f -size +5M -not -path "./.git/*" -not -path "./node_modules/*")
          if [ -n "$LARGE" ]; then
            echo "::warning::File > 5 MB trovati (considera Git LFS o esclusione):"
            echo "$LARGE"
          fi
