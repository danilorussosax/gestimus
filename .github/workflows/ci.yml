name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # NB: il frontend vanilla è stato deprecato e rimosso. I job che ne
  # verificavano la sintassi JS e il checkJs (lint-js, typecheck-frontend) sono
  # stati eliminati: il gate frontend è ora il solo job `frontend-react`.

  # ---------------------------------------------------------------------------
  # 2) Sintassi script bash (scripts/ + deploy/)
  # ---------------------------------------------------------------------------
  lint-bash:
    name: Lint Bash (syntax + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash -n su tutti gli script
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            # Salta script non-bash (es. dev-proxy.sh usa zsh: print -P, %F{...}).
            # bash -n li parserebbe con la grammatica sbagliata.
            case "$(head -1 "$f")" in *zsh*) echo "skip (zsh): $f"; continue;; esac
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error"
              FAIL=1
            fi
          done < <(find scripts deploy -type f -name "*.sh")
          exit $FAIL

      - name: shellcheck
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq shellcheck
          # ShellCheck supporta solo sh/bash/dash/ksh (SC1071): escludi gli zsh.
          FILES=()
          for f in scripts/*.sh; do
            case "$(head -1 "$f")" in *zsh*) echo "shellcheck skip (zsh): $f"; continue;; esac
            FILES+=("$f")
          done
          # SC1091 (sourced file not found) e SC2086 (word splitting intentionale): noi li tolleriamo
          shellcheck --severity=warning --exclude=SC1091,SC2086,SC2034 "${FILES[@]}" || exit 1

  # ---------------------------------------------------------------------------
  # 2b) Audit vulnerabilità dipendenze (npm) per server/ e frontend/.
  #     Legge il package-lock.json (niente install pesante: --ignore-scripts).
  #     Soglia 'high' → falliscono solo high/critical; moderate/low non rompono
  #     la CI. Job leggero e separato dal pesante server-tests.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: npm audit — server
        working-directory: server
        run: npm audit --audit-level=high

      - name: npm audit — frontend
        working-directory: frontend
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # 3) Server TypeScript: typecheck (Drizzle ORM + Fastify routes)
  # ---------------------------------------------------------------------------
  lint-server:
    name: Lint server (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # #2: build del package condiviso PRIMA del server (lo importa via file:).
      - name: Build shared scoring package
        working-directory: packages/scoring
        run: npm install --no-audit --no-fund && npm run build

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 3a-bis) Frontend React (frontend/): typecheck strict + lint + unit + build.
  # ---------------------------------------------------------------------------
  frontend-react:
    name: Frontend React (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # #2: build del package condiviso PRIMA del frontend (lo importa via file:).
      - name: Build shared scoring package
        working-directory: packages/scoring
        run: npm install --no-audit --no-fund && npm run build

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck (tsc -b strict)
        working-directory: frontend
        run: npx tsc -b

      - name: Lint (eslint — 0 errori)
        working-directory: frontend
        run: npm run lint

      - name: Unit test (vitest)
        working-directory: frontend
        run: npm run test

      - name: Build (vite + PWA)
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # 3b) Test server (integrazione): Postgres 18 reale → bootstrap + setup +
  #     seed + suite completa (rls/auth/crud/realtime). uuidv7() richiede PG18.
  # ---------------------------------------------------------------------------
  server-tests:
    name: Server tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_BOOTSTRAP: postgres://postgres:postgres@localhost:5432/postgres
      DATABASE_URL_APP: postgres://gestimus_app:devpassword@localhost:5432/gestimus
      DATABASE_URL_SUPER: postgres://gestimus_super:devpassword@localhost:5432/gestimus
      SESSION_COOKIE_SECRET: ci-secret-min-32-chars-long-aaaaaaaaaaaa
      GESTIMUS_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      # #2: build del package condiviso PRIMA del server (lo importa via file:).
      - name: Build shared scoring package
        working-directory: packages/scoring
        run: npm install --no-audit --no-fund && npm run build
      - name: Install deps
        working-directory: server
        run: npm ci
      - name: Bootstrap DB (ruoli + database)
        working-directory: server
        run: npm run db:bootstrap
      - name: Setup schema + policies RLS
        working-directory: server
        # drizzle-kit push richiede un TTY (config strict:true). In CI usiamo
        # --force che auto-approva senza prompt; su DB vuoto non c'è comunque
        # data-loss. Poi applichiamo policies/trigger/RLS.
        run: |
          npx drizzle-kit push --force
          npm run db:policies
      - name: Seed dati demo
        working-directory: server
        run: npm run db:seed
      - name: Run test suite
        working-directory: server
        run: npm test

  # ---------------------------------------------------------------------------
  # 4) Migrazioni SQL incrementali: pattern + ordine progressivo
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pattern + ordine progressivo
        run: |
          set -e
          # Pattern up:   server/scripts/migrations/YYYY_MM_DD_<descr>.sql
          # Pattern down: server/scripts/migrations/YYYY_MM_DD_<descr>.down.sql (rollback, opzionale)
          # L'ordine è dato dal nome (lessicografico) ed è strettamente crescente.
          PREV=""
          COUNT=0
          shopt -s nullglob
          for f in $(ls server/scripts/migrations/*.sql 2>/dev/null | sort); do
            base=$(basename "$f")
            # I file di rollback sono validati a parte (sotto): saltali qui.
            case "$base" in *.down.sql) continue;; esac
            if ! echo "$base" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[a-z0-9_]+\.sql$'; then
              echo "::error file=$f::Migration name non rispetta il pattern YYYY_MM_DD_<descr>.sql"
              exit 1
            fi
            if [ -n "$PREV" ] && [ "$base" \< "$PREV" ]; then
              echo "::error file=$f::Migration ($base) precede $PREV — le migration devono essere progressive"
              exit 1
            fi
            PREV=$base
            COUNT=$((COUNT + 1))
          done
          echo "✓ $COUNT migration SQL (up) verificate"

      - name: Rollback (.down.sql) — naming + match con la up
        run: |
          set -e
          DOWN=0
          shopt -s nullglob
          for f in server/scripts/migrations/*.down.sql; do
            base=$(basename "$f")
            if ! echo "$base" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[a-z0-9_]+\.down\.sql$'; then
              echo "::error file=$f::Rollback name non rispetta il pattern YYYY_MM_DD_<descr>.down.sql"
              exit 1
            fi
            up="server/scripts/migrations/${base%.down.sql}.sql"
            if [ ! -f "$up" ]; then
              echo "::error file=$f::Rollback senza migration up corrispondente ($up)"
              exit 1
            fi
            DOWN=$((DOWN + 1))
          done
          echo "✓ $DOWN rollback (.down.sql) verificati"
          echo "ℹ Le migration nuove DOVREBBERO includere un .down.sql; quelle senza sono dichiarate irreversibili (vedi docs/MIGRATIONS.md)."

  # ---------------------------------------------------------------------------
  # 5) i18n: parità di copertura EN/FR/ES rispetto a IT sui locale React.
  #    (Le traduzioni sono in frontend/src/i18n/locales/<lang>.json, flat keys.)
  #    NB: niente più scansione "uso vs IT": il frontend React usa il pattern
  #    t(key, { defaultValue }) per alcune stringhe, quindi non tutte le chiavi
  #    usate sono definite nei JSON. La parità tra lingue resta l'invariante.
  # ---------------------------------------------------------------------------
  i18n-coverage:
    name: i18n coverage (parità EN/FR/ES vs IT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verifica parità chiavi i18n (React)
        run: |
          python3 <<'PY'
          import json, sys, os
          base = 'frontend/src/i18n/locales'
          def keys_of(lang):
              p = f'{base}/{lang}.json'
              if not os.path.exists(p):
                  return None
              with open(p, encoding='utf-8') as fh:
                  return set(json.load(fh).keys())
          it_keys = keys_of('it')
          if it_keys is None:
              print(f'::error::{base}/it.json non trovato'); sys.exit(1)
          rc = 0
          for lang in ('en', 'fr', 'es'):
              k = keys_of(lang)
              if k is None:
                  print(f'::error::{base}/{lang}.json non trovato'); rc = 1; continue
              miss = sorted(it_keys - k)
              extra = sorted(k - it_keys)
              print(f'{lang}: {len(k)} chiavi · mancanti vs IT: {len(miss)} · extra: {len(extra)}')
              for x in miss[:30]:
                  print(f'::error::chiave i18n mancante in {lang}: {x}')
              if miss:
                  rc = 1
          print(f'IT: {len(it_keys)} chiavi')
          sys.exit(rc)
          PY

  # ---------------------------------------------------------------------------
  # 6) Filesystem audit: nessun file > 5 MB nel repo (oltre alla soglia GH 100 MB)
  # ---------------------------------------------------------------------------
  size-audit:
    name: Audit dimensioni file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verifica nessun file > 5 MB
        run: |
          set -e
          LARGE=$(find . -type f -size +5M -not -path "./.git/*" -not -path "./node_modules/*")
          if [ -n "$LARGE" ]; then
            echo "::warning::File > 5 MB trovati (considera Git LFS o esclusione):"
            echo "$LARGE"
          fi

  # ---------------------------------------------------------------------------
  # 3c) E2E smoke + flussi core (Playwright) — gate browser-to-backend.
  #     Stack riproducibile: Postgres 18 reale → bootstrap/schema/policies/seed
  #     → backend Fastify (:4000) → frontend Vite (:5173, proxy con Host
  #     preservato) → Playwright (chromium).
  #     Il tenant è risolto SOLO dal sottodominio (Host header): mappiamo
  #     ente1.gestimus.local → 127.0.0.1 in /etc/hosts con uno step automatico,
  #     così non serve alcuna configurazione locale manuale. Il modello di
  #     sicurezza (tenant da Host, niente header di bypass) resta invariato.
  #     Blocca il merge se login / workspace admin / crea-fase / voto-commissario
  #     regrediscono.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E smoke + flussi core (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_BOOTSTRAP: postgres://postgres:postgres@localhost:5432/postgres
      DATABASE_URL_APP: postgres://gestimus_app:devpassword@localhost:5432/gestimus
      DATABASE_URL_SUPER: postgres://gestimus_super:devpassword@localhost:5432/gestimus
      SESSION_COOKIE_SECRET: ci-secret-min-32-chars-long-aaaaaaaaaaaa
      GESTIMUS_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      LOG_LEVEL: error
      # NB: NODE_ENV NON impostato → default 'development'. È l'ambiente in cui
      # gli E2E sono scritti e passano: cookie SameSite=Lax (necessario col proxy
      # cross-port :5173→:4000) e rate-limit login rilassato (100k fuori prod, vs
      # 10/15min in prod) così i login admin↔commissario ripetuti non vengono
      # bloccati.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            frontend/package-lock.json

      # #2: build del package condiviso PRIMA di server/frontend (lo importano via file:).
      - name: Build shared scoring package
        working-directory: packages/scoring
        run: npm install --no-audit --no-fund && npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright (chromium + deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Bootstrap DB (ruoli + database)
        working-directory: server
        run: npm run db:bootstrap
      - name: Setup schema + policies RLS
        working-directory: server
        run: |
          npx drizzle-kit push --force
          npm run db:policies
      - name: Seed dati demo
        working-directory: server
        run: npm run db:seed

      - name: Mappa tenant ente1 → 127.0.0.1 (niente /etc/hosts manuale)
        run: echo "127.0.0.1 ente1.gestimus.local" | sudo tee -a /etc/hosts

      - name: Avvia backend Fastify (:4000, background)
        working-directory: server
        run: |
          npx tsx src/index.ts > /tmp/backend.log 2>&1 &
          # Readiness: /readyz verifica anche la connettività DB.
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/readyz >/dev/null; then
              echo "backend ready ($i s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::backend non avviato/non pronto entro 90s"
          cat /tmp/backend.log || true
          exit 1

      - name: Playwright (smoke + flussi core)
        working-directory: frontend
        # Playwright avvia da sé il dev server Vite (webServer in config). 1 retry
        # assorbe la flakiness transitoria di timing realtime/SSE.
        run: npx playwright test --retries=1 --reporter=list,html

      - name: Backend log (debug)
        if: always()
        run: cat /tmp/backend.log || true

      - name: Upload Playwright report + trace (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
