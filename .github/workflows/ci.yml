name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1) Sintassi JavaScript: tutti i .js dell'app (frontend vanilla)
  # ---------------------------------------------------------------------------
  lint-js:
    name: Lint JavaScript (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check syntax di tutti i file JS
        run: |
          set -e
          FAIL=0
          # Esclude node_modules, pocketbase/ (binari legacy), test-results, server/ (TypeScript)
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "::error file=$f::Syntax error"
              FAIL=1
            fi
          done < <(find . -type f -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./pocketbase/*" \
            -not -path "./server/node_modules/*" \
            -not -path "./test-results/*")
          exit $FAIL

  # ---------------------------------------------------------------------------
  # 1b) Type-check JS: checkJs su TUTTO il frontend vanilla (gate, non solo core)
  # ---------------------------------------------------------------------------
  typecheck-frontend:
    name: Typecheck frontend (checkJs STRICT, tutto js/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install typescript
        run: npm install --no-save typescript@5
      - name: tsc --checkJs strict su tutto js/
        run: npx tsc -p tsconfig.frontend.json

  # ---------------------------------------------------------------------------
  # 2) Sintassi script bash (scripts/ + deploy/)
  # ---------------------------------------------------------------------------
  lint-bash:
    name: Lint Bash (syntax + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash -n su tutti gli script
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error"
              FAIL=1
            fi
          done < <(find scripts deploy -type f -name "*.sh")
          exit $FAIL

      - name: shellcheck
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq shellcheck
          # SC1091 (sourced file not found) e SC2086 (word splitting intentionale): noi li tolleriamo
          shellcheck --severity=warning --exclude=SC1091,SC2086,SC2034 scripts/*.sh || exit 1

  # ---------------------------------------------------------------------------
  # 3) Server TypeScript: typecheck (Drizzle ORM + Fastify routes)
  # ---------------------------------------------------------------------------
  lint-server:
    name: Lint server (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 3b) Test server (integrazione): Postgres 18 reale → bootstrap + setup +
  #     seed + suite completa (rls/auth/crud/realtime). uuidv7() richiede PG18.
  # ---------------------------------------------------------------------------
  server-tests:
    name: Server tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_BOOTSTRAP: postgres://postgres:postgres@localhost:5432/postgres
      DATABASE_URL_APP: postgres://gestimus_app:devpassword@localhost:5432/gestimus
      DATABASE_URL_SUPER: postgres://gestimus_super:devpassword@localhost:5432/gestimus
      SESSION_COOKIE_SECRET: ci-secret-min-32-chars-long-aaaaaaaaaaaa
      GESTIMUS_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install deps
        working-directory: server
        run: npm ci
      - name: Bootstrap DB (ruoli + database)
        working-directory: server
        run: npm run db:bootstrap
      - name: Setup schema + policies RLS
        working-directory: server
        # drizzle-kit push richiede un TTY (config strict:true). In CI usiamo
        # --force che auto-approva senza prompt; su DB vuoto non c'è comunque
        # data-loss. Poi applichiamo policies/trigger/RLS.
        run: |
          npx drizzle-kit push --force
          npm run db:policies
      - name: Seed dati demo
        working-directory: server
        run: npm run db:seed
      - name: Run test suite
        working-directory: server
        run: npm test

  # ---------------------------------------------------------------------------
  # 4) Migrazioni SQL incrementali: pattern + ordine progressivo
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pattern + ordine progressivo
        run: |
          set -e
          # Pattern: server/scripts/migrations/YYYY_MM_DD_<descr>.sql
          # L'ordine è dato dal nome (lessicografico) ed è strettamente crescente.
          PREV=""
          COUNT=0
          shopt -s nullglob
          for f in $(ls server/scripts/migrations/*.sql 2>/dev/null | sort); do
            base=$(basename "$f")
            if ! echo "$base" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[a-z0-9_]+\.sql$'; then
              echo "::error file=$f::Migration name non rispetta il pattern YYYY_MM_DD_<descr>.sql"
              exit 1
            fi
            if [ -n "$PREV" ] && [ "$base" \< "$PREV" ]; then
              echo "::error file=$f::Migration ($base) precede $PREV — le migration devono essere progressive"
              exit 1
            fi
            PREV=$base
            COUNT=$((COUNT + 1))
          done
          echo "✓ $COUNT migration SQL verificate"

  # ---------------------------------------------------------------------------
  # 5) i18n: (a) tutte le chiavi t() usate sono definite in IT (error);
  #          (b) parità di copertura EN/FR/ES rispetto a IT (report).
  # ---------------------------------------------------------------------------
  i18n-coverage:
    name: i18n coverage (uso vs IT + parità EN/FR/ES)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verifica chiavi i18n
        run: |
          python3 <<'PY'
          import re, glob, sys, os
          used = set()
          for f in glob.glob('js/**/*.js', recursive=True):
              src = open(f).read()
              for m in re.finditer(r"\bt\(\s*['\"]([^'\"]+)['\"]", src):
                  used.add(m.group(1))

          # Le traduzioni sono splittate per lingua in js/i18n/<lang>.js
          # (export const <lang> = { ... }). Il file contiene solo coppie chiave:valore.
          def block_for(lang):
              p = f'js/i18n/{lang}.js'
              return open(p).read() if os.path.exists(p) else None

          def keys_of(block):
              return set(km.group(1) for km in re.finditer(r"['\"]([a-zA-Z][a-zA-Z0-9._-]*)['\"]\s*:", block))

          it_block = block_for('it')
          if it_block is None:
              print('::error::js/i18n/it.js non trovato'); sys.exit(1)
          it_keys = keys_of(it_block)

          # (a) chiavi usate ma non definite in IT → error.
          missing_it = sorted([k for k in used if k not in it_keys])
          print(f'USATE: {len(used)} · DEFINITE (it): {len(it_keys)} · NON-DEFINITE: {len(missing_it)}')
          rc = 0
          if missing_it:
              for k in missing_it[:30]:
                  print(f'::error::chiave i18n usata ma non definita in IT: {k}')
              rc = 1

          # (b) parità EN/FR/ES vs IT → error. La copertura completa è ora un
          #     invariante (non solo IT): una chiave nuova senza tutte le
          #     traduzioni fa fallire la CI, prevenendo la deriva.
          for lang in ('en', 'fr', 'es'):
              b = block_for(lang)
              if b is None:
                  print(f'::error::blocco lingua {lang} non trovato'); rc = 1; continue
              miss = sorted(it_keys - keys_of(b))
              print(f'{lang}: definite {len(keys_of(b))} · mancanti vs IT: {len(miss)}')
              if miss:
                  for k in miss[:30]:
                      print(f'::error::chiave i18n mancante in {lang}: {k}')
                  rc = 1
          sys.exit(rc)
          PY

  # ---------------------------------------------------------------------------
  # 6) Filesystem audit: nessun file > 5 MB nel repo (oltre alla soglia GH 100 MB)
  # ---------------------------------------------------------------------------
  size-audit:
    name: Audit dimensioni file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verifica nessun file > 5 MB
        run: |
          set -e
          LARGE=$(find . -type f -size +5M -not -path "./.git/*" -not -path "./node_modules/*")
          if [ -n "$LARGE" ]; then
            echo "::warning::File > 5 MB trovati (considera Git LFS o esclusione):"
            echo "$LARGE"
          fi
