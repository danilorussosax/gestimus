name: Check PocketBase update

# Esegue ogni lunedì alle 09:00 UTC: confronta la versione di PB attualmente usata
# (in scripts/setup-server.sh) con l'ultima release ufficiale; apre una issue se
# disponibile una versione più recente.
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Confronta versioni
        id: check
        run: |
          set -e
          CURRENT=$(grep -oE 'PB_VERSION:-[0-9]+\.[0-9]+\.[0-9]+' scripts/setup-server.sh | head -1 | sed 's/PB_VERSION:-//')
          LATEST=$(curl -sf https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r .tag_name | sed 's/^v//')
          echo "Versione corrente: $CURRENT"
          echo "Ultima rilasciata: $LATEST"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "outdated=true" >> $GITHUB_OUTPUT
          else
            echo "outdated=false" >> $GITHUB_OUTPUT
          fi

      - name: Apri issue se aggiornamento disponibile
        if: steps.check.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.check.outputs.current }}"
          LATEST="${{ steps.check.outputs.latest }}"
          TITLE="PocketBase: aggiornamento disponibile $CURRENT → $LATEST"
          # Evita duplicati: se la issue è già aperta, skippa
          EXISTING=$(gh issue list --search "$TITLE in:title" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Issue già aperta: #$EXISTING"
            exit 0
          fi
          gh issue create --title "$TITLE" --label "dependencies,pocketbase" --body "$(cat <<EOF
          PocketBase ha rilasciato una nuova versione.

          - **Attuale**: $CURRENT
          - **Ultima**: $LATEST
          - **Changelog**: https://github.com/pocketbase/pocketbase/releases/tag/v$LATEST

          ## Azioni
          1. Verificare i breaking changes (collection schema, JS hooks API)
          2. Aggiornare \`PB_VERSION\` in \`scripts/setup-server.sh\`
          3. Testare in locale \`./scripts/start-local-multitenant.sh\`
          4. Aggiornare i tenant esistenti con \`scripts/rolling-restart.sh\` dopo aver scaricato il nuovo binario
          EOF
          )"
