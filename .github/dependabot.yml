version: 2
updates:
  # GitHub Actions: aggiorna versione delle azioni usate nei workflow (checkout, setup-node, ecc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'ci'

  # npm (root): poche dipendenze (playwright per i test E2E), ma tenute aggiornate
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: 'deps'
    # Raggruppa minor/patch in un'unica PR per ridurre il rumore
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # npm (server): dipendenze dell'app backend Fastify (/server)
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: 'deps'
    # Raggruppa minor/patch in un'unica PR per ridurre il rumore
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # npm (frontend): dipendenze della SPA React (/frontend)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: 'deps'
    # Raggruppa minor/patch in un'unica PR per ridurre il rumore
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
