# Snippet rate-limit nginx per Gestimus.
# Da includere a livello `http {}` (in /etc/nginx/conf.d/ o nginx.conf).
# Definisce zone di rate-limit usate dai server-block per tenant.
#
# Installazione:
#   sudo cp deploy/nginx-snippet-rl.conf /etc/nginx/conf.d/gestimus-rl.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Le zone sono per IP (binary_remote_addr) e dimensionate per ~16k IP unici/ora.

# Form pubblico iscrizioni: 5 richieste/min/IP, burst 5 nel server-block.
limit_req_zone $binary_remote_addr zone=iscrizioni_rl:10m rate=5r/m;

# Endpoint auth (login/reset): 10 richieste/min/IP per ridurre brute force.
# Da abilitare con `limit_req zone=auth_rl burst=10 nodelay;` su /api/collections/accounts/auth-with-password
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;
