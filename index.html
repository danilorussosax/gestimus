<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4169E1" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="light" />
  <title>Gestimus — Gestionale Concorso Musicale</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF + autoTable per l'export del protocollo (caricati on-demand al click) -->
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <!-- marked (Markdown renderer) per la pagina Admin → Manuale -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // shadcn-style HSL tokens (resolved via CSS variables in styles.css)
            border:      'hsl(var(--border))',
            input:       'hsl(var(--input))',
            ring:        'hsl(var(--ring))',
            background:  'hsl(var(--background))',
            foreground:  'hsl(var(--foreground))',
            primary: {
              DEFAULT:   'hsl(var(--primary))',
              foreground:'hsl(var(--primary-foreground))',
            },
            secondary: {
              DEFAULT:   'hsl(var(--secondary))',
              foreground:'hsl(var(--secondary-foreground))',
            },
            destructive: {
              DEFAULT:   'hsl(var(--destructive))',
              foreground:'hsl(var(--destructive-foreground))',
            },
            muted: {
              DEFAULT:   'hsl(var(--muted))',
              foreground:'hsl(var(--muted-foreground))',
            },
            accent: {
              DEFAULT:   'hsl(var(--accent))',
              foreground:'hsl(var(--accent-foreground))',
              50:  '#EFF8FE', 100: '#D9EEFC', 200: '#B2DCF7',
              300: '#7DC1EE', 400: '#48A2DD', 500: '#1E83C8', 600: '#1268A6',
            },
            popover: {
              DEFAULT:   'hsl(var(--popover))',
              foreground:'hsl(var(--popover-foreground))',
            },
            card: {
              DEFAULT:   'hsl(var(--card))',
              foreground:'hsl(var(--card-foreground))',
            },
            // Legacy "brand" palette kept (royal blue) for back-compat with views
            brand: {
              50:'#EFF3FF', 100:'#DAE2FF', 200:'#B5C5FF', 300:'#8BA4FF',
              400:'#5C82FF', 500:'#4169E1', 600:'#3253BB', 700:'#2843A0',
              800:'#1F347D', 900:'#152560',
            },
            sun: {
              50:'#FFF7E0', 400:'#FFC85C', 500:'#F5A623', 600:'#C97D0F',
            },
            canvas: { DEFAULT: 'hsl(var(--background))', 50: '#FFFFFF' },
            ink: {
              900: 'hsl(var(--foreground))',
              800: '#1A2342',
              700: '#2E3554',
              500: 'hsl(var(--muted-foreground))',
              400: '#8089A6',
            },
          },
          fontFamily: {
            sans: ['Roboto', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            mono: ['Roboto Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          // shadcn radius scale (driven by --radius in CSS)
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
          // shadcn-style elevation (subtle, non-tinted)
          boxShadow: {
            soft: '0 1px 2px 0 rgb(0 0 0 / 0.05)',
            glow: '0 0 0 2px hsl(var(--ring))',
            ring: '0 0 0 2px hsl(var(--ring))',
            pop:  '0 10px 30px -15px rgb(0 0 0 / 0.20), 0 4px 10px -6px rgb(0 0 0 / 0.10)',
          },
          ringColor: { DEFAULT: 'hsl(var(--ring))' },
          ringOffsetColor: { DEFAULT: 'hsl(var(--background))' },
          keyframes: {
            'accordion-down': { from: { height: '0' }, to: { height: 'var(--radix-accordion-content-height)' } },
            'accordion-up':   { from: { height: 'var(--radix-accordion-content-height)' }, to: { height: '0' } },
          },
          transitionTimingFunction: {
            'expressive': 'cubic-bezier(0.2, 0, 0.38, 0.9)',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="bg-background text-foreground antialiased min-h-screen flex flex-col">

  <a href="#app-root" class="skip-link" data-i18n="app.skipLink">Salta al contenuto</a>

  <!-- App shell header — shadcn navbar -->
  <header class="bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/80 sticky top-0 z-30 border-b border-border">
    <div class="w-full pl-4 pr-2 sm:pl-6 sm:pr-4 h-16 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <a href="#/" id="home-link" class="flex items-center gap-3 min-w-0 group hover:opacity-80 transition-opacity rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2" data-i18n-aria-label="app.go_dashboard" aria-label="Dashboard">
          <img id="header-logo" src="./logo.png" alt="" class="w-10 h-10 sm:w-11 sm:h-11 object-contain rounded-md ring-1 ring-border bg-card" />
          <div class="flex flex-col min-w-0 leading-tight">
            <h1 class="text-[15px] font-bold tracking-tight text-foreground truncate" data-i18n="app.title">Gestimus</h1>
            <span class="text-[12px] text-muted-foreground truncate hidden sm:inline" data-i18n="app.subtitle">Gestionale Concorso Musicale</span>
          </div>
        </a>
        <p class="text-[11px] font-mono uppercase tracking-wider text-muted-foreground ml-3 pl-3 border-l border-border hidden md:block" id="header-subtitle">—</p>
      </div>

      <div class="flex items-center gap-2">
        <!-- Language switcher (shadcn-style outline button + menu) -->
        <div class="relative" id="lang-switcher">
          <button id="lang-btn" type="button" aria-haspopup="menu" aria-expanded="false"
                  class="inline-flex items-center gap-1.5 text-sm font-medium border border-input bg-background hover:bg-accent hover:text-accent-foreground transition-colors h-9 px-3 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
            <span id="lang-flag" aria-hidden="true">🇮🇹</span>
            <span id="lang-code" class="uppercase tracking-wider text-xs">IT</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="lang-menu" role="menu" class="hidden absolute right-0 mt-2 w-44 rounded-md border border-border bg-popover text-popover-foreground shadow-md overflow-hidden z-40 p-1"></div>
        </div>
        <span id="role-badge" class="hidden sm:inline-flex items-center gap-1.5 text-[11px] font-semibold px-2.5 h-7 bg-secondary text-secondary-foreground rounded-md border border-border"></span>
        <button id="security-btn" aria-label="Sicurezza account (2FA)" title="Sicurezza account (2FA)"
                class="hidden text-sm font-medium hover:bg-accent hover:text-accent-foreground px-3 h-9 rounded-md transition-colors inline-flex items-center gap-1.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span class="hidden sm:inline">2FA</span>
        </button>
        <button id="logout-btn" data-i18n-aria-label="app.logout" aria-label="Esci"
                class="hidden text-sm font-medium hover:bg-accent hover:text-accent-foreground px-3 h-9 rounded-md transition-colors inline-flex items-center gap-1.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          <span data-i18n="app.logout">Esci</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Toast container -->
  <div id="toast-root" role="region" data-i18n-aria-label="toast.info" aria-label="Notifiche" class="fixed top-16 right-4 z-50 flex flex-col gap-2 pointer-events-none [&>*]:pointer-events-auto"></div>

  <!-- Main view -->
  <main id="app-root" tabindex="-1" class="flex-1 w-full focus:outline-none"></main>

  <!-- Modal root -->
  <div id="modal-root"></div>

  <footer class="border-t border-border bg-background/50">
    <div class="w-full px-4 sm:px-6 h-11 text-[11px] font-mono uppercase tracking-wider text-muted-foreground flex items-center justify-between gap-4">
      <span data-i18n="app.footer.runtime">Gestimus · piattaforma concorsi musicali</span>
      <div class="flex items-center gap-4">
        <a href="#/privacy" class="hover:underline text-primary normal-case tracking-normal text-xs flex items-center gap-1.5">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
          <span>Privacy / GDPR</span>
        </a>
        <button id="seed-btn" data-i18n="app.footer.seed" class="hidden text-primary hover:underline font-medium normal-case tracking-normal text-xs">Carica dati di esempio</button>
      </div>
    </div>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
